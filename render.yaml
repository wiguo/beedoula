services:
  - type: web
    name: beedoula-agent
    runtime: python
    plan: free
    buildCommand: pip install uv && uv sync --frozen && touch .env
    startCommand: uv run langgraph dev --host 0.0.0.0 --port $PORT --no-browser --allow-blocking
    healthCheckPath: /ok
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.1
      - key: LLM_GATEWAY_BASE_URL
        value: https://ai-gateway.vercel.sh/v1
      - key: LLM_GATEWAY_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGSMITH_PROJECT
        value: beedoula
      - key: OPENAI_CHAT_MODEL
        value: openai/gpt-5.4-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: openai/text-embedding-3-small
      - key: RAG_DATA_DIR
        value: data
      - key: RETRIEVER_MODE
        value: hybrid
